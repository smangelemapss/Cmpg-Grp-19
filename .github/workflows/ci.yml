name: Ubuntu Clinic CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          grep -v "cx_Oracle" requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt

      - name: Check SQL files exist
        run: |
          test -f ../sql/00_RUN_ALL.sql
          test -f ../sql/01_DDL/01_create_tables.sql
          test -f ../sql/01_DDL/02_create_indexes.sql
          test -f ../sql/01_DDL/03_create_views.sql
          test -f ../sql/02_DML/04_insert_data.sql
          test -f ../sql/04_queries/05_queries.sql
          echo "All SQL files present and accounted for"

      - name: Run backend tests
        run: pytest --tb=short -v
        env:
          ORA_USER: test
          ORA_PASSWORD: test
          ORA_HOST: localhost
          ORA_PORT: 1521
          ORA_SID: XE
          JWT_SECRET: ci-test-secret