name: CI

on:
  push:
    branches:
      - dev
      - "feature/*"
  pull_request:
    branches:
      - dev

jobs:
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Remove committed node_modules
        run: rm -rf node_modules

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npx vite build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Oracle mocked in tests)
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          ORA_USER: system
          ORA_PASSWORD: dummy
          ORA_HOST: localhost
          ORA_PORT: "1521"
          ORA_SID: XE
          JWT_SECRET: ci-test-secret
          FLASK_ENV: development
        run: pytest -q

  api-routes:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify frontend api.js matches Flask routes
        working-directory: backend
        env:
          ORA_USER: system
          ORA_PASSWORD: dummy
          ORA_HOST: localhost
          ORA_PORT: "1521"
          ORA_SID: XE
          JWT_SECRET: ci-test-secret
          FLASK_ENV: development
        run: |
          pip install -r requirements.txt -q
          python scripts/verify_api_routes.py
