# Ubuntu Clinic — production nginx (Linux VM / cloud server)
# Serves React build + proxies API to gunicorn on port 8000.
#
# 1. Build frontend:  cd frontend && VITE_API_URL= npm run build
# 2. Copy dist/ to:   /var/www/ubuntu-clinic/
# 3. Start API:       cd backend && gunicorn -w 4 -b 127.0.0.1:8000 "app:app"
# 4. Copy this file:  sudo cp deploy/nginx-ubuntu-clinic.conf /etc/nginx/sites-available/ubuntu-clinic
# 5. Enable:          sudo ln -s .../sites-available/ubuntu-clinic .../sites-enabled/
# 6. Test & reload:   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name clinic.example.com;   # <-- your domain or server IP

    root /var/www/ubuntu-clinic;
    index index.html;

    # React SPA + static assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Flask API (same paths as development)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
